services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    environment:
      HERMES_HOME: /data/hermes
      MESSAGING_CWD: ${MESSAGING_CWD:-/workspace}

      # LLM provider: set one approach
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

      # Messaging examples: only set what you use
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS:-}

      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_ALLOWED_USERS: ${DISCORD_ALLOWED_USERS:-}

      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      SLACK_ALLOWED_USERS: ${SLACK_ALLOWED_USERS:-}

      # Webhook mode: only if you want inbound HTTP
      WEBHOOK_ENABLED: ${WEBHOOK_ENABLED:-false}
      WEBHOOK_PORT: ${WEBHOOK_PORT:-8644}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}

      # Optional startup probe for debugging the local API server from inside
      # the running Hermes container. Disabled by default.
      API_SERVER_DIAG_ON_START: ${API_SERVER_DIAG_ON_START:-false}
      API_SERVER_DIAG_DELAY: ${API_SERVER_DIAG_DELAY:-10}

    volumes:
      - hermes-data:/data/hermes
      - hermes-workspace:/workspace

    command:
      - sh
      - -lc
      - |
        /opt/venv/bin/hermes gateway -v &
        pid=$$!
        if [ "${API_SERVER_DIAG_ON_START:-false}" = "true" ]; then
          sleep "${API_SERVER_DIAG_DELAY:-10}"
          /opt/venv/bin/python - <<'PY'
          import os
          import socket
          import traceback
          import urllib.request

          host = "127.0.0.1"
          port = int(os.getenv("API_SERVER_PORT", "8642"))
          key = os.getenv("API_SERVER_KEY", "")
          print(f"API_SERVER_DIAG host={host} port={port}")

          try:
              with socket.create_connection((host, port), timeout=5):
                  print("API_SERVER_SOCKET_OK")
          except Exception as exc:
              print(f"API_SERVER_SOCKET_ERROR: {exc!r}")

          if not key:
              print("API_SERVER_HTTP_SKIPPED: missing API_SERVER_KEY")
          else:
              try:
                  req = urllib.request.Request(
                      f"http://{host}:{port}/v1/models",
                      headers={"Authorization": f"Bearer {key}"},
                  )
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      print(f"API_SERVER_HTTP_STATUS: {resp.status}")
                      print(resp.read().decode())
              except Exception as exc:
                  print(f"API_SERVER_HTTP_ERROR: {exc!r}")
                  traceback.print_exc()
          PY
        fi
        wait "$$pid"

    # Uncomment only if you use webhook mode:
    # ports:
    #   - "8644:8644"

volumes:
  hermes-data:
  hermes-workspace:
