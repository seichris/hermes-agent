#
# docker-compose.yml for Hermes Agent
#
# Usage:
#   HERMES_UID=$(id -u) HERMES_GID=$(id -g) docker compose up -d
#
# Set HERMES_UID / HERMES_GID to the host user that owns ~/.hermes so
# files created inside the container stay readable/writable on the host.
# The entrypoint remaps the internal `hermes` user to these values via
# usermod/groupmod + gosu.
#
# Security notes:
#   - The dashboard service binds to 0.0.0.0 for reverse-proxy platforms
#     like Coolify. It stores API keys; only expose it behind an authenticated
#     proxy or private network.
#   - The gateway's API server is off unless you uncomment API_SERVER_KEY
#     and API_SERVER_HOST. See docs/user-guide/api-server.md before doing
#     this on an internet-facing host.
#
services:
  gateway:
    image: ${HERMES_IMAGE:-ghcr.io/seichris/hermes-agent:prebuilt-image}
    container_name: hermes
    restart: unless-stopped
    network_mode: host
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    volumes:
      - ~/.hermes:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - NOUS_API_KEY=${NOUS_API_KEY:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - SLACK_ALLOWED_USERS=${SLACK_ALLOWED_USERS:-}
      - SLACK_ALLOW_ALL_USERS=${SLACK_ALLOW_ALL_USERS:-}
      - SLACK_HOME_CHANNEL=${SLACK_HOME_CHANNEL:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
      - TELEGRAM_GROUP_ALLOWED_USERS=${TELEGRAM_GROUP_ALLOWED_USERS:-}
      - TELEGRAM_GROUP_ALLOWED_CHATS=${TELEGRAM_GROUP_ALLOWED_CHATS:-}
      - TELEGRAM_ALLOW_ALL_USERS=${TELEGRAM_ALLOW_ALL_USERS:-}
      - TELEGRAM_HOME_CHAT_ID=${TELEGRAM_HOME_CHAT_ID:-}
      - GATEWAY_ALLOWED_USERS=${GATEWAY_ALLOWED_USERS:-}
      - GATEWAY_ALLOW_ALL_USERS=${GATEWAY_ALLOW_ALL_USERS:-}
      - API_SERVER_KEY=${API_SERVER_KEY:-}
      - API_SERVER_HOST=${API_SERVER_HOST:-}
      # To expose the OpenAI-compatible API server beyond localhost,
      # uncomment BOTH lines (API_SERVER_KEY is mandatory for auth):
      # - API_SERVER_HOST=0.0.0.0
      # - API_SERVER_KEY=${API_SERVER_KEY:-}
      # Microsoft Teams — uncomment and fill in to enable Teams gateway.
      # Register your bot at https://dev.botframework.com/ to get these values.
      # - TEAMS_CLIENT_ID=${TEAMS_CLIENT_ID}
      # - TEAMS_CLIENT_SECRET=${TEAMS_CLIENT_SECRET}
      # - TEAMS_TENANT_ID=${TEAMS_TENANT_ID}
      # - TEAMS_ALLOWED_USERS=${TEAMS_ALLOWED_USERS}
      # - TEAMS_PORT=${TEAMS_PORT:-3978}
    command: ["gateway", "run"]

  dashboard:
    image: ${HERMES_IMAGE:-ghcr.io/seichris/hermes-agent:prebuilt-image}
    container_name: hermes-dashboard
    restart: unless-stopped
    network_mode: host
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    depends_on:
      - gateway
    volumes:
      - ~/.hermes:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - NOUS_API_KEY=${NOUS_API_KEY:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - SLACK_ALLOWED_USERS=${SLACK_ALLOWED_USERS:-}
      - SLACK_ALLOW_ALL_USERS=${SLACK_ALLOW_ALL_USERS:-}
      - SLACK_HOME_CHANNEL=${SLACK_HOME_CHANNEL:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
      - TELEGRAM_GROUP_ALLOWED_USERS=${TELEGRAM_GROUP_ALLOWED_USERS:-}
      - TELEGRAM_GROUP_ALLOWED_CHATS=${TELEGRAM_GROUP_ALLOWED_CHATS:-}
      - TELEGRAM_ALLOW_ALL_USERS=${TELEGRAM_ALLOW_ALL_USERS:-}
      - TELEGRAM_HOME_CHAT_ID=${TELEGRAM_HOME_CHAT_ID:-}
      - GATEWAY_ALLOWED_USERS=${GATEWAY_ALLOWED_USERS:-}
      - GATEWAY_ALLOW_ALL_USERS=${GATEWAY_ALLOW_ALL_USERS:-}
      - API_SERVER_KEY=${API_SERVER_KEY:-}
      - API_SERVER_HOST=${API_SERVER_HOST:-}
      - GATEWAY_HEALTH_URL=${GATEWAY_HEALTH_URL:-http://127.0.0.1:8642}
    command: ["dashboard", "--host", "0.0.0.0", "--no-open", "--insecure"]
