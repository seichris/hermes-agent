name: Build prebuilt Hermes image

on:
  workflow_dispatch:
  push:
    branches:
      - prebuilt-image
      - upstream-clean

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/seichris/hermes-agent
  SOURCE_REF: prebuilt-image

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out clean upstream source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_REF }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:upstream-clean
            ${{ env.IMAGE_NAME }}:prebuilt-image
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            HERMES_BROWSER_TOOLS=0
          cache-from: type=gha
          cache-to: type=gha,mode=max
